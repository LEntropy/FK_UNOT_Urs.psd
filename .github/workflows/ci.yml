name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: contracts (forge test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge build
        working-directory: contracts
        run: forge build
      - name: forge test
        working-directory: contracts
        run: forge test -vvv

  blockchain-svc:
    name: blockchain-svc (npm test)
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      # Tests spawn a local anvil chain and deploy the compiled artifact
      # (apps/blockchain-svc/test/anvil.ts) -- no real testnet/secrets needed,
      # but contracts/ must be built first so the artifact exists.
      - name: forge build (contracts artifact for anvil.ts)
        working-directory: contracts
        run: forge build
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/blockchain-svc/package-lock.json
      - name: npm ci
        working-directory: apps/blockchain-svc
        run: npm ci
      - name: npm run build
        working-directory: apps/blockchain-svc
        run: npm run build
      - name: npm test
        working-directory: apps/blockchain-svc
        run: npm test

  asset-service:
    name: asset-service (npm test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/asset-service/package-lock.json
      - name: npm ci
        working-directory: apps/asset-service
        run: npm ci
      - name: npm run build
        working-directory: apps/asset-service
        run: npm run build
      - name: npm test
        working-directory: apps/asset-service
        # Fully mocked/in-memory (vi.mock on HTTP clients, :memory: sqlite) --
        # no .env or external services needed.
        run: npm test

  kms-adapter:
    name: infra/kms-adapter (npm test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/kms-adapter/package-lock.json
      - name: npm ci
        working-directory: infra/kms-adapter
        run: npm ci
      - name: npm run build
        working-directory: infra/kms-adapter
        run: npm run build
      - name: npm test
        working-directory: infra/kms-adapter
        # roundtrip.test.ts's live-server test hits the real KMS server on
        # the Pi over the internet -- not something a CI runner should
        # depend on (flaky, exposes that host to every CI run). Skipped
        # here; verified manually against the live server when this package
        # changes (see infra/kms-adapter's own test file).
        run: SKIP_KMS_INTEGRATION=1 npm test

  api-gateway:
    name: api-gateway (npm test)
    runs-on: ubuntu-latest
    needs: kms-adapter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            infra/kms-adapter/package-lock.json
            apps/api-gateway/package-lock.json
      # api-gateway depends on @dontai/kms-adapter via a `file:` reference
      # (no workspace tooling in this repo, per README) -- it must be built
      # in this same job before `npm ci` in apps/api-gateway can resolve it.
      - name: build infra/kms-adapter
        working-directory: infra/kms-adapter
        run: npm ci && npm run build
      - name: npm ci
        working-directory: apps/api-gateway
        run: npm ci
      - name: npm run build
        working-directory: apps/api-gateway
        run: npm run build
      - name: npm test
        working-directory: apps/api-gateway
        # wrapKey() in auth.test.ts is a local RSA encrypt against the
        # checked-in kms-keys/ fixture -- no live KMS server call, safe for CI.
        run: npm test

  web:
    name: web (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        working-directory: apps/web
        run: npm ci
      - name: npm run build
        working-directory: apps/web
        # No test suite yet (see apps/web/README.md's scope) -- build alone
        # catches TS errors and Vite bundling failures.
        run: npm run build

  rust-core:
    name: protection-svc/rust-core (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/protection-svc/rust-core
      - name: cargo build --release
        working-directory: apps/protection-svc/rust-core
        run: cargo build --release
      - name: cargo test
        working-directory: apps/protection-svc/rust-core
        run: cargo test

  protection-svc-lint:
    name: protection-svc (ruff lint + server.py pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install ruff
        run: pip install ruff
      - name: ruff check
        working-directory: apps/protection-svc
        run: ruff check orchestrate.py server.py remote_gpu.py ml-engine/src
      # ml-engine's cloak/style-confusion code itself still has zero
      # automated tests (only argparse CLI scripts, GPU-dependent) -- that
      # remains the AI-engine track's territory. But server.py imports
      # orchestrate.py which imports style_cloak, so even the mocked-protect()
      # HTTP-contract tests in test/test_server.py need ml-engine's deps
      # importable -- hence installing the full (CPU-wheel) requirements.txt
      # here rather than a slimmer server-only one.
      - name: install ml-engine deps (for server.py's import chain)
        working-directory: apps/protection-svc/ml-engine
        run: pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
      - name: pytest (server.py, orchestrate.protect() mocked -- no GPU)
        working-directory: apps/protection-svc
        run: python -m pytest test/ -q

  detection-svc:
    name: detection-svc (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install dependencies
        working-directory: apps/detection-svc
        run: pip install -r requirements.txt
      - name: pytest
        working-directory: apps/detection-svc
        # HTTP-mocked (asset-service + Vision API) -- no real network calls,
        # no API key needed in CI.
        run: pytest

  docker-build:
    name: docker compose build (validate Dockerfiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose build
        run: docker compose -f docker-compose.yml build

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
amoy = "${AMOY_RPC_URL}"
polygon = "${POLYGON_RPC_URL}"

[etherscan]
amoy = { key = "${POLYGONSCAN_API_KEY}", chain = 80002, url = "https://api.etherscan.io/v2/api?chainid=80002" }
polygon = { key = "${POLYGONSCAN_API_KEY}", chain = 137, url = "https://api.etherscan.io/v2/api?chainid=137" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
